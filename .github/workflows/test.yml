name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.tool }} / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
        tool: [rsc, mtctl]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: src/${{ matrix.tool }}/uv.lock

      - name: Sync
        working-directory: src/${{ matrix.tool }}
        run: uv sync --python ${{ matrix.python-version }}

      - name: Test
        working-directory: src/${{ matrix.tool }}
        run: uv run pytest -q
